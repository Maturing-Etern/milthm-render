[build]
  # 发布目录为 milthm render 根目录（index.html 在此）
  publish = "."

# 强制 HTTPS（Netlify 默认已开启，此处显式声明）
[[redirects]]
  from = "http://*:80/*"
  to = "https://:8080/:splat"
  status = 301
  force = true

# SPA 兜底（本项目非 SPA，但保留以防后续扩展）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = { Cookie = ["spa_redirect"] }

# 缓存策略
[[headers]]
  for = "/*.avif"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"
