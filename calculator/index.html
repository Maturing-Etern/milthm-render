<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milthm 查分器 · 雨之韵律</title>
<meta name="description" content="Milthm 查分器 - 精准计算 Reality 分数，分析音游成绩">
<script src="js/constant.js"></script>
<style>
/* ==================== 字体 ==================== */
@font-face {
    font-family: 'milFont';
    src: url('../rain player/Fonts/milfont.ttf') format('truetype');
    font-weight: normal;
    font-display: swap;
}
@font-face {
    font-family: 'milFontBold';
    src: url('../rain player/Fonts/milfont_bold.ttf') format('truetype');
    font-weight: bold;
    font-display: swap;
}

/* ==================== 设计令牌 ==================== */
:root {
    --font-primary: 'milFont', 'Segoe UI', system-ui, sans-serif;
    --font-bold: 'milFontBold', 'milFont', 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'Consolas', 'Fira Code', monospace;
    --rain-sky: rgb(142, 197, 252);
    --rain-teal: rgb(41, 168, 185);
    --rain-sky-dark: rgb(128, 178, 228);
    --rain-teal-dark: rgb(37, 153, 168);
    --bg-dark: #1a1a2e;
    --panel-dark: #16213e;
    --text-light: #e0e6ed;
    --text-dim: rgba(255,255,255,0.55);
    --text-muted: rgba(255,255,255,0.35);
    --accent-glow: rgba(142, 197, 252, 0.25);
    --border-glow: rgba(142, 197, 252, 0.12);
    --border-active: rgba(142, 197, 252, 0.35);
    --shadow-neon: 0 0 25px rgba(142, 197, 252, 0.06);
    --success: #4db6ac;
    --error: #ef5350;
    --warning: #ffb74d;
    --gold: #ffd700;
    --radius-sm: 0.5em;
    --radius-md: 0.8em;
    --radius-lg: 1.2em;
    --radius-xl: 2em;
    --transition: 200ms ease-out;
    /* 分类主题色 */
    --cat-theme: #7c4dff;
    --cat-amethyst: #ce93d8;
    --cat-sapphire: #42a5f5;
    --cat-emerald: #66bb6a;
    --cat-ruby: #ef5350;
    --cat-default: var(--rain-sky);
}

/* ==================== 重置 & 基础 ==================== */
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
    width: 100%; min-height: 100vh;
    font-family: var(--font-primary);
    background: var(--bg-dark);
    color: var(--text-light);
    overflow-x: hidden;
}

body {
    background-image:
        radial-gradient(ellipse 70% 50% at 80% 20%, rgba(142, 197, 252, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 60% at 20% 90%, rgba(41, 168, 185, 0.05) 0%, transparent 60%);
    background-attachment: fixed;
}

/* ==================== 滚动条 ==================== */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 8px; }
::-webkit-scrollbar-thumb {
    background: linear-gradient(to bottom, var(--rain-sky), var(--rain-teal));
    border-radius: 8px;
    border: 2px solid transparent;
    background-clip: padding-box;
}
::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(to bottom, var(--rain-sky-dark), var(--rain-teal-dark));
    background-clip: padding-box;
}

/* ==================== 雨幕动画 ==================== */
.rain-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
}
.raindrop {
    position: absolute;
    top: -10px;
    width: 1.5px;
    height: 56px;
    background: linear-gradient(to bottom, transparent, rgba(142, 197, 252, 0.4));
    border-radius: 1px;
    opacity: 0;
    animation: fall linear infinite;
}
@keyframes fall {
    0%   { transform: translateY(-20vh) scale(0.5); opacity: 0; }
    5%   { opacity: 0.7; }
    50%  { opacity: 0.5; }
    100% { transform: translateY(105vh) scale(1); opacity: 0; }
}

/* ==================== 头部 ==================== */
.hero {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 40px 20px 30px;
    background: linear-gradient(180deg, rgba(22,33,62,0.6) 0%, transparent 100%);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-glow);
}
.hero h1 {
    font-family: var(--font-bold);
    font-size: 2.2rem;
    background: linear-gradient(135deg, var(--rain-sky), var(--rain-teal));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
}
.hero p {
    color: var(--text-dim);
    font-size: 0.92rem;
    letter-spacing: 0.04em;
}

/* ==================== 容器 ==================== */
.app {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 20px 60px;
}

/* ==================== 玻璃卡片 ==================== */
.glass {
    background: linear-gradient(145deg, rgba(22,33,62,0.85), rgba(26,26,46,0.9));
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border-glow);
    border-radius: var(--radius-lg);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3), var(--shadow-neon);
    transition: border-color var(--transition), box-shadow var(--transition);
}
.glass:hover {
    border-color: var(--border-active);
    box-shadow: 0 8px 40px rgba(0,0,0,0.35), 0 0 30px rgba(142,197,252,0.08);
}

/* ==================== 输入区 ==================== */
.input-panel {
    padding: 28px;
    margin-bottom: 24px;
}
.input-panel .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    margin-bottom: 14px;
}
.input-panel .toolbar .label {
    color: var(--rain-sky);
    font-family: var(--font-bold);
    font-size: 1rem;
    letter-spacing: 0.03em;
}
.input-panel textarea {
    width: 100%;
    min-height: 120px;
    padding: 14px;
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--border-glow);
    border-radius: var(--radius-md);
    color: var(--text-light);
    font-family: var(--font-mono);
    font-size: 0.82rem;
    line-height: 1.5;
    resize: vertical;
    outline: none;
    transition: border-color var(--transition), box-shadow var(--transition);
}
.input-panel textarea:focus {
    border-color: rgba(142, 197, 252, 0.45);
    box-shadow: 0 0 18px rgba(142, 197, 252, 0.08);
}
.input-panel textarea::placeholder {
    color: var(--text-muted);
}

/* ==================== 按钮 ==================== */
.btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 22px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--font-bold);
    font-size: 0.88rem;
    cursor: pointer;
    transition: all var(--transition);
    letter-spacing: 0.03em;
}
.btn-primary {
    background: linear-gradient(135deg, var(--rain-sky), var(--rain-teal));
    color: #fff;
    box-shadow: 0 3px 14px rgba(142, 197, 252, 0.25);
}
.btn-primary:hover {
    filter: brightness(1.1);
    transform: translateY(-1px);
    box-shadow: 0 5px 20px rgba(142, 197, 252, 0.35);
}
.btn-outline {
    background: rgba(142, 197, 252, 0.08);
    border: 1px solid var(--border-glow);
    color: var(--text-dim);
}
.btn-outline:hover {
    background: rgba(142, 197, 252, 0.16);
    border-color: var(--border-active);
    color: var(--text-light);
}
.btn-success {
    background: linear-gradient(135deg, #4db6ac, #26a69a);
    color: #fff;
    box-shadow: 0 3px 14px rgba(77, 182, 172, 0.2);
}
.btn-success:hover {
    filter: brightness(1.08);
    transform: translateY(-1px);
}

/* ==================== 统计面板 ==================== */
.stats-bar {
    display: none;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
}
.stats-bar.visible { display: grid; }

.stat-card {
    padding: 20px;
    text-align: center;
}
.stat-card .stat-icon {
    font-size: 1.3rem;
    margin-bottom: 6px;
    opacity: 0.7;
}
.stat-card .stat-value {
    font-family: var(--font-bold);
    font-size: 1.8rem;
    background: linear-gradient(135deg, var(--rain-sky), var(--rain-teal));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
}
.stat-card .stat-label {
    font-size: 0.78rem;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 0.04em;
}
.stat-card .stat-sub {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 2px;
}

/* ==================== 结果列表 ==================== */
.results {
    display: none;
}
.results.visible { display: block; }

/* 分类标题 */
.category-header {
    padding: 14px 20px;
    margin: 20px 0 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-left: 3px solid var(--cat-default);
}
.category-header .cat-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
}
.category-header .cat-name {
    font-family: var(--font-bold);
    font-size: 0.95rem;
    color: var(--text-light);
}
.category-header .cat-count {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-left: auto;
}

/* 歌曲行 */
.song-row {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    gap: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background var(--transition);
    cursor: default;
}
.song-row:hover {
    background: rgba(142, 197, 252, 0.04);
}
.song-row:last-child { border-bottom: none; }

.song-rank {
    width: 32px;
    text-align: center;
    font-size: 0.8rem;
    color: var(--text-dim);
    font-family: var(--font-mono);
    flex-shrink: 0;
}
.song-rank.top3 { font-family: var(--font-bold); }
.song-rank.r1 { color: #ffd700; }
.song-rank.r2 { color: #c0c0c0; }
.song-rank.r3 { color: #cd7f32; }

.song-name {
    flex: 1;
    min-width: 0;
    font-size: 0.88rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.song-const {
    width: 50px;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 0.78rem;
    color: var(--text-dim);
    flex-shrink: 0;
}
.song-score {
    width: 80px;
    text-align: right;
    font-family: var(--font-mono);
    font-size: 0.82rem;
    flex-shrink: 0;
}
.song-acc {
    width: 65px;
    text-align: right;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--text-dim);
    flex-shrink: 0;
}
.song-level {
    width: 36px;
    text-align: center;
    font-size: 0.72rem;
    flex-shrink: 0;
}
.song-reality {
    width: 70px;
    text-align: right;
    font-family: var(--font-bold);
    font-size: 0.95rem;
    flex-shrink: 0;
}

/* Reality 颜色等级 */
.r-gold { color: #ffd700; }
.r-green { color: #4db6ac; }
.r-blue { color: var(--rain-sky); }
.r-orange { color: #ffb74d; }
.r-gray { color: var(--text-dim); }

/* 等级徽章 */
.lv-badge {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 3px;
    font-size: 0.68rem;
    font-weight: 600;
}
.lv-ez  { background: rgba(102, 187, 106, 0.2); color: #66bb6a; }
.lv-nr  { background: rgba(66, 165, 245, 0.2); color: #42a5f5; }
.lv-hd  { background: rgba(206, 147, 216, 0.2); color: #ce93d8; }
.lv-ec  { background: rgba(239, 83, 80, 0.2); color: #ef5350; }
.lv-fc  { background: rgba(255, 215, 0, 0.2); color: #ffd700; }

/* 清除 + 空状态 */
.clear-btn-wrap {
    text-align: center;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.05);
}
.empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--text-muted);
}
.empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
.empty-state .empty-text { font-size: 0.9rem; }

/* ==================== 文件输入隐藏 ==================== */
#fileInput { display: none; }

/* ==================== 加载动画 ==================== */
.spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: var(--rain-sky);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ==================== 响应式 ==================== */
@media (max-width: 768px) {
    .hero h1 { font-size: 1.5rem; }
    .stats-bar { grid-template-columns: 1fr; }
    .song-row { flex-wrap: wrap; padding: 8px 12px; gap: 6px; }
    .song-rank { width: 24px; }
    .song-score { width: auto; }
    .song-acc { width: auto; }
    .song-const { width: auto; }
    .song-reality { width: auto; }
    .input-panel { padding: 18px; }
    .app { padding: 16px 12px; }
}

@media (max-width: 480px) {
    .hero { padding: 24px 14px 20px; }
    .hero h1 { font-size: 1.2rem; }
    .stat-card .stat-value { font-size: 1.4rem; }
    .btn { padding: 8px 14px; font-size: 0.8rem; }
}
</style>

<body>

<!-- 雨幕 -->
<div class="rain-canvas" id="rainCanvas"></div>

<!-- 头部 -->
<header class="hero">
    <h1>☁ Milthm 查分器</h1>
    <p>Reality 分数计算 · 成绩分析 · 数据可视化</p>
</header>

<!-- 主应用 -->
<div class="app">

    <!-- 输入面板 -->
    <div class="glass input-panel">
        <div class="toolbar">
            <span class="label">📋 数据输入</span>
            <button class="btn btn-primary" onclick="startProcess()" id="parseBtn">▶ 解析</button>
            <button class="btn btn-outline" onclick="document.getElementById('fileInput').click()">📁 导入文件</button>
            <input type="file" id="fileInput" accept=".json,.txt,.xml,.reg,.db,.png">
            <span id="fileStatus" style="font-size:0.78rem;color:var(--text-muted);margin-left:auto;"></span>
        </div>
        <textarea id="inputData" placeholder="在此粘贴查分数据...&#10;&#10;支持格式：&#10;· 新格式: [用户名],{[曲名,分类,定数,分数,准确率,等级],...}&#10;· 旧格式: JSON 存档数据&#10;· 也支持 .db / .txt / .json / .xml 文件导入"></textarea>
    </div>

    <!-- 统计面板 -->
    <div class="stats-bar" id="statsBar">
        <div class="glass stat-card">
            <div class="stat-icon">👤</div>
            <div class="stat-value" id="statUser">—</div>
            <div class="stat-label">玩家</div>
        </div>
        <div class="glass stat-card">
            <div class="stat-icon">⭐</div>
            <div class="stat-value" id="statAvg">—</div>
            <div class="stat-label">B20 平均 Reality</div>
            <div class="stat-sub">Top 20 曲目</div>
        </div>
        <div class="glass stat-card">
            <div class="stat-icon">📊</div>
            <div class="stat-value" id="statTlr">—</div>
            <div class="stat-label">TRL</div>
            <div class="stat-sub">理论 Reality 上限</div>
        </div>
    </div>

    <!-- 结果区域 -->
    <div class="results" id="results">
        <div id="resultContent"></div>
        <div class="clear-btn-wrap">
            <button class="btn btn-outline" onclick="clearResults()">🧹 清除结果</button>
        </div>
    </div>

    <!-- 空状态 -->
    <div class="glass empty-state" id="emptyState">
        <div class="empty-icon">🎵</div>
        <div class="empty-text">输入数据后点击「解析」按钮查看查分结果</div>
    </div>

</div>

<script>
/* ==================================================================
   核心查分算法
   ================================================================== */

// ---------- Reality 计算 ----------
function reality(score, c) {
    if (c < 0.001) return 0;
    if (score >= 1005000) return 1 + c;
    if (score >= 995000) return 1.4 / (Math.exp(363.175 - score * 0.000365) + 1) - 0.4 + c;
    if (score >= 980000) return ((Math.exp(3.1 * (score - 980000) / 15000) - 1) / (Math.exp(3.1) - 1)) * 0.8 - 0.5 + c;
    if (score >= 700000) return score / 280000 - 4 + c;
    return 0;
}

// ---------- 反推分数 ----------
function findScore(constant, target) {
    if (target <= constant - 1.5) return 700000;
    if (target > 1 + constant) return "Unable to deduce points";
    if (target == (1 + constant)) return 1005000;
    if (target > 0.3 + constant) {
        return Math.min(Math.ceil(10000 * (99.5 + Math.log((1.4 / (target + 0.4 - constant)) - 1) / -3.65)), 1005000);
    } else if (target > -0.5 + constant) {
        return Math.ceil(980000 + 15000 * (Math.log(((target + 0.5 - constant) / 0.8) * (Math.exp(3.1) - 1) + 1) / 3.1));
    } else {
        return Math.ceil((target - constant + 4) * 280000);
    }
    return 114514;
}

// ---------- TRL 计算 ----------
function tlr(items) {
    let as, ar;
    if (items.length >= 20) {
        let aitems = items.slice(0, 20);
        as = aitems.reduce((sum, i) => sum + i.bestScore, 0) / aitems.length;
        ar = aitems.reduce((sum, i) => sum + i.singleRealityRaw, 0) / aitems.length;
        aitems.forEach(i => {
            i.ltlr = (i.singleRealityRaw - ar) / 20 + reality(as + (i.bestScore - as) / 20, 0);
        });
        for (let i = 20; i < items.length; i++) {
            let curr = items[i];
            let ltlr = (curr.singleRealityRaw - ar) / 20 + reality(as + (curr.bestScore - as) / 20, 0);
            let minLtlrItem = aitems.reduce((min, x) => x.ltlr < min.ltlr ? x : min);
            if (ltlr > minLtlrItem.ltlr) {
                let index = aitems.indexOf(minLtlrItem);
                curr.ltlr = ltlr;
                aitems[index] = curr;
                as = aitems.reduce((sum, i) => sum + i.bestScore, 0) / aitems.length;
                ar = aitems.reduce((sum, i) => sum + i.singleRealityRaw, 0) / aitems.length;
                aitems.forEach(i => { i.ltlr = (i.singleRealityRaw - ar) / 20 + reality(as + (i.bestScore - as) / 20, 0); });
            }
        }
        ar = typeof ar !== 'undefined' ? ar : items.slice(0, 20).reduce((sum, i) => sum + (i.singleRealityRaw || 0), 0) / items.slice(0, 20).length;
        as = typeof as !== 'undefined' ? as : items.slice(0, 20).reduce((sum, i) => sum + (i.bestScore || 0), 0) / items.slice(0, 20).length;
        return reality(as, ar) - 1;
    }
    return 0;
}

// ---------- 解析新格式 ----------
function processSong(song) {
    const [title, category, constant, score, accuracy, level] = song.replace(/[\[\]]/g, '').split(',');
    const constantVal = parseFloat(constant);
    const scoreVal = parseInt(score, 10);
    const accuracyVal = parseFloat(accuracy);
    const levelVal = parseInt(level, 10);
    const singleRealityRaw = reality(scoreVal, constantVal);
    return {
        singleRealityRaw,
        singleReality: singleRealityRaw.toFixed(2),
        constant: constantVal,
        name: title,
        category,
        bestScore: scoreVal,
        bestAccuracy: accuracyVal.toFixed(4),
        bestLevel: levelVal
    };
}

// ---------- 解析旧格式 ----------
function processSongFromOldFormat(record) {
    const { BeatmapID, BestScore, BestAccuracy, BestLevel, AchievedStatus } = record;
    const constantObj = constants[BeatmapID];
    if (!constantObj) return null;
    const { constant, category, name } = constantObj;
    const singleRealityRaw = reality(BestScore, constant);
    let bl = 0;
    if (BestLevel == 1) {
        bl = AchievedStatus.includes(5) ? 1 : (AchievedStatus.includes(4) ? 3 : 5);
    } else if (BestLevel == 2) {
        bl = AchievedStatus.includes(5) ? 2 : (AchievedStatus.includes(4) ? 4 : 6);
    } else if (BestLevel != 0) {
        bl = BestLevel + 4;
    }
    return {
        singleRealityRaw,
        singleReality: singleRealityRaw.toFixed(2),
        constant: constant,
        name,
        category,
        bestScore: BestScore,
        bestAccuracy: BestAccuracy.toFixed(4),
        bestLevel: bl
    };
}

// ---------- 数据入口 ----------
function processData(inputText) {
    const inputData = inputText.replace(/\n/g, '').replace(/  /g, '');
    const format = /^\[.*\],\{.*\}$/.test(inputData) ? 'new' : 'old';

    let username, items;
    if (format === 'new') {
        const [, uname, songDataStr] = inputData.match(/^\[(.*?)\],\{(.*)\}$/);
        username = uname;
        const songData = songDataStr.split('],[');
        items = songData.map(processSong);
    } else {
        // 提取最外层 JSON 对象（不依赖字段顺序）
        const jsonStart = inputData.indexOf('{');
        const jsonEnd = inputData.lastIndexOf('}');
        if (jsonStart === -1 || jsonEnd === -1) {
            return { error: '数据格式无法识别，请检查输入内容' };
        }
        const str = inputData.slice(jsonStart, jsonEnd + 1);
        let parsed;
        try { parsed = JSON.parse(str); } catch (e) { parsed = null; }
        if (!parsed || !parsed.SongRecords) {
            return { error: '数据格式无法识别，请检查输入内容' };
        }
        username = parsed.UserName;
        items = parsed.SongRecords.map(processSongFromOldFormat).filter(Boolean);
    }

    // 按 Reality 降序排序
    items.sort((a, b) => b.singleRealityRaw - a.singleRealityRaw);
    return { username, items };
}

// ---------- 条目工具 ----------
function tryParseJSON(str) {
    try { return JSON.parse(str); } catch (e) { return null; }
}

/* ==================================================================
   UI 渲染
   ================================================================== */

// 等级编号 → 文本
const levelLabels = ['', 'EZ1', 'EZ2', 'EZ3', 'EZ4', 'NR1', 'NR2', 'NR3', 'NR4', 'HD1', 'HD2', 'HD3', 'HD4', 'EX1', 'EX2', 'EX3', 'EX4', 'FC1', 'FC2', 'FC3', 'FC4'];
const levelClasses = ['', 'lv-ez','lv-ez','lv-ez','lv-ez','lv-nr','lv-nr','lv-nr','lv-nr','lv-hd','lv-hd','lv-hd','lv-hd','lv-ec','lv-ec','lv-ec','lv-ec','lv-fc','lv-fc','lv-fc','lv-fc'];

// 分类对应的主题色
const categoryColors = {
    'Theme':     '#7c4dff',
    'Amethyst':  '#ce93d8',
    'Sapphire':  '#42a5f5',
    'Emerald':   '#66bb6a',
    'Ruby':      '#ef5350'
};
const categoryNames = {
    'Theme': '主题',
    'Amethyst': '紫晶',
    'Sapphire': '蓝宝石',
    'Emerald': '翡翠',
    'Ruby': '红宝石'
};

function getRealityClass(r) {
    const v = parseFloat(r);
    if (v >= 16) return 'r-gold';
    if (v >= 14.5) return 'r-green';
    if (v >= 13) return 'r-blue';
    if (v >= 11) return 'r-orange';
    return 'r-gray';
}

function renderResults(data) {
    // 显示统计面板
    const statsBar = document.getElementById('statsBar');
    statsBar.classList.add('visible');
    document.getElementById('statUser').textContent = data.username;
    document.getElementById('statAvg').textContent = data.avgReality;
    document.getElementById('statTlr').textContent = data.tlrValue;

    // 按分类分组
    const groups = {};
    data.items.forEach(item => {
        const cat = item.category || 'Unknown';
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push(item);
    });

    const container = document.getElementById('resultContent');
    container.innerHTML = '';

    let rank = 0;
    const catOrder = ['Theme', 'Amethyst', 'Sapphire', 'Emerald', 'Ruby'];
    for (const cat of catOrder) {
        if (!groups[cat]) continue;
        const items = groups[cat];
        const color = categoryColors[cat] || 'var(--rain-sky)';

        // 分类标题
        const header = document.createElement('div');
        header.className = 'glass category-header';
        header.style.borderLeftColor = color;
        header.innerHTML = `
            <span class="cat-dot" style="background:${color};box-shadow:0 0 8px ${color}44;"></span>
            <span class="cat-name">${categoryNames[cat] || cat}</span>
            <span class="cat-count">${items.length} 首</span>
        `;
        container.appendChild(header);

        // 歌曲行
        items.forEach(item => {
            rank++;
            const rClass = getRealityClass(item.singleReality);
            const lvClass = levelClasses[item.bestLevel] || '';
            const lvLabel = levelLabels[item.bestLevel] || '';
            const rankClass = rank <= 3 ? `top3 r${rank}` : '';

            const row = document.createElement('div');
            row.className = 'song-row';
            row.innerHTML = `
                <span class="song-rank ${rankClass}">#${rank}</span>
                <span class="song-name" title="${item.name}">${item.name}</span>
                <span class="song-const">${item.constant.toFixed(1)}</span>
                <span class="song-score">${item.bestScore.toLocaleString()}</span>
                <span class="song-acc">${item.bestAccuracy}</span>
                <span class="song-level"><span class="lv-badge ${lvClass}">${lvLabel}</span></span>
                <span class="song-reality ${rClass}">${item.singleReality}</span>
            `;
            container.appendChild(row);
        });
    }

    // 显示结果区域，隐藏空状态
    document.getElementById('results').classList.add('visible');
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('fileStatus').textContent = `${data.items.length} 首曲目`;
}

function clearResults() {
    document.getElementById('inputData').value = '';
    document.getElementById('resultContent').innerHTML = '';
    document.getElementById('results').classList.remove('visible');
    document.getElementById('statsBar').classList.remove('visible');
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('statUser').textContent = '—';
    document.getElementById('statAvg').textContent = '—';
    document.getElementById('statTlr').textContent = '—';
    document.getElementById('fileStatus').textContent = '';
}

/* ==================================================================
   文件导入
   ================================================================== */
document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    document.getElementById('fileStatus').textContent = '读取中...';

    const reader = new FileReader();
    reader.onload = function(ev) {
        const content = ev.target.result;
        const name = file.name;

        if (name.endsWith('.json') || name.endsWith('.txt') || name.endsWith('.db')) {
            // JSON / 文本数据
            const extracted = extractJSON(content);
            if (extracted) {
                document.getElementById('inputData').value = extracted;
                document.getElementById('fileStatus').textContent = '文件就绪 ✓';
                // 自动解析
                startProcess();
            } else {
                document.getElementById('inputData').value = content;
                document.getElementById('fileStatus').textContent = '文件已载入，请手动解析';
            }
        } else if (name.endsWith('.xml')) {
            const doc = new DOMParser().parseFromString(content, 'application/xml');
            const pf = doc.querySelector('string[name="PlayerFile"]');
            if (pf && pf.textContent) {
                document.getElementById('inputData').value = decodeURIComponent(pf.textContent);
                document.getElementById('fileStatus').textContent = 'XML 解析完成 ✓';
                startProcess();
            } else {
                document.getElementById('fileStatus').textContent = 'XML 格式无法识别';
            }
        } else if (name.endsWith('.reg')) {
            const match = content.match(/"PlayerFile_h\d+"\s*=\s*hex:((?:[0-9a-fA-F]{2},?[\\\n\s]*)+)/);
            if (match) {
                const decoded = match[1].replace(/[,\\\s\n]/g, '').match(/.{2}/g).map(b => String.fromCharCode(parseInt(b, 16))).join('');
                document.getElementById('inputData').value = decoded;
                document.getElementById('fileStatus').textContent = '.reg 解析完成 ✓';
                startProcess();
            } else {
                document.getElementById('fileStatus').textContent = '.reg 格式无法识别';
            }
        } else if (name.endsWith('.png')) {
            const udMatch = content.match(/userdata:([\s\S]+)/);
            if (udMatch) {
                document.getElementById('inputData').value = udMatch[1].trim();
                document.getElementById('fileStatus').textContent = 'PNG 数据提取完成 ✓';
                startProcess();
            } else {
                document.getElementById('fileStatus').textContent = 'PNG 中未找到 userdata';
            }
        } else {
            document.getElementById('fileStatus').textContent = '不支持的文件类型';
        }
    };
    reader.readAsText(file);
    e.target.value = '';
});

function extractJSON(str) {
    const start = str.indexOf('{');
    const end = str.indexOf(']}]', start);
    return (start !== -1 && end !== -1) ? str.slice(start, end + 3) + '}' : null;
}

/* ==================================================================
   主流程入口
   ================================================================== */
function startProcess() {
    const textarea = document.getElementById('inputData');
    const raw = textarea.value.trim();
    if (!raw) {
        document.getElementById('fileStatus').textContent = '⚠ 请先输入数据';
        return;
    }

    // 按钮状态
    const btn = document.getElementById('parseBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>解析中...';

    setTimeout(() => {
        try {
            const result = processData(raw);
            if (result.error) {
                document.getElementById('fileStatus').textContent = '⚠ ' + result.error;
                btn.disabled = false;
                btn.innerHTML = '▶ 解析';
                return;
            }

            const items = result.items;
            if (items.length === 0) {
                document.getElementById('fileStatus').textContent = '⚠ 未解析到有效数据';
                btn.disabled = false;
                btn.innerHTML = '▶ 解析';
                return;
            }

            // 计算平均值 (B20)
            const b20Items = items.filter(i => i.singleRealityRaw > 0).slice(0, 20);
            const avgRaw = b20Items.length > 0
                ? (b20Items.reduce((acc, i) => acc + i.singleRealityRaw, 0) / b20Items.length)
                : 0;
            const avgReality = Math.floor(avgRaw * 10000) / 10000;

            // 计算 TRL
            const tlrValue = tlr(items);
            const tlrFormatted = tlrValue ? tlrValue.toFixed(4) : '0.0000';

            // 格式化输入框
            const formatted = '[' + result.username + '],{\n  ' +
                items.map(i => `[${i.name},${i.category},${i.constant},${i.bestScore},${i.bestAccuracy},${i.bestLevel}]`).join(',\n  ') +
                '\n}';
            textarea.value = formatted;

            // 渲染
            renderResults({
                username: result.username,
                avgReality: avgReality.toFixed(4),
                tlrValue: tlrFormatted,
                items: items
            });

            document.getElementById('fileStatus').textContent = `✅ ${items.length} 首曲目 · B20 ${avgReality.toFixed(4)}`;
        } catch (e) {
            document.getElementById('fileStatus').textContent = '⚠ 解析出错: ' + e.message;
        }

        btn.disabled = false;
        btn.innerHTML = '▶ 解析';
    }, 100);
}

/* ==================================================================
   雨幕动画
   ================================================================== */
(function initRain() {
    const canvas = document.getElementById('rainCanvas');
    const count = 40;
    const drops = [];

    for (let i = 0; i < count; i++) {
        const drop = document.createElement('div');
        drop.className = 'raindrop';
        const dur = 0.8 + Math.random() * 1.5;
        drop.style.left = Math.random() * 100 + '%';
        drop.style.animationDuration = dur + 's';
        drop.style.animationDelay = Math.random() * 2 + 's';
        drop.style.height = (30 + Math.random() * 50) + 'px';
        drop.style.opacity = '0.3';
        canvas.appendChild(drop);
        drops.push(drop);
    }

    // 定期补充雨滴维持数量
    setInterval(() => {
        const existing = canvas.querySelectorAll('.raindrop');
        if (existing.length < count) {
            const drop = document.createElement('div');
            drop.className = 'raindrop';
            const dur = 0.8 + Math.random() * 1.5;
            drop.style.left = Math.random() * 100 + '%';
            drop.style.animationDuration = dur + 's';
            drop.style.animationDelay = '0s';
            drop.style.height = (30 + Math.random() * 50) + 'px';
            canvas.appendChild(drop);
            setTimeout(() => { if (drop.parentNode) drop.remove(); }, (dur + 1) * 1000);
        }
    }, 3000);
})();

/* ==================================================================
   快捷键
   ================================================================== */
document.addEventListener('keydown', function(e) {
    // Ctrl+Enter 解析
    if (e.ctrlKey && e.key === 'Enter') {
        e.preventDefault();
        startProcess();
    }
    // Ctrl+Shift+C 清除
    if (e.ctrlKey && e.shiftKey && e.key === 'C') {
        e.preventDefault();
        clearResults();
    }
});
